repos:
-   repo: local
    hooks:
    -   id: flake8
        name: flake8
        entry: env -i PATH=./.venv/bin python -m flake8
        language: system
        types: [python]
        exclude: ^(docs|examples|tests/)
    -   id: black
        name: black
        entry: env -i PATH=./.venv/bin python -m black
        language: system
        types: [python]
        args: [--check]  # Prevents auto-formatting during pre-commit
    -   id: trailing-whitespace
        name: trailing-whitespace
        entry: env -i PATH=./.venv/bin python -m pre_commit_hooks.trailing_whitespace_fixer
        language: system
        types: [text]
    -   id: end-of-file-fixer
        name: end-of-file-fixer
        entry: env -i PATH=./.venv/bin python -m pre_commit_hooks.end_of_file_fixer
        language: system
        types: [text]
    -   id: mypy
        name: mypy
        entry: env -i PATH=./.venv/bin PYTHONPATH=./ python -m mypy
        args: [--config-file=mypy.ini, --ignore-missing-imports]
        language: system
        types: [python]
        exclude: ^(docs|examples|tests/)
